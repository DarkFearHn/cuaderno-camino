<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creciendo en la Palabra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cover:#1c2b47; --cover-deep:#141f35; --foil:#c9a96a;
    --paper:#fbf7ee; --ink:#3a3226; --ink-soft:#6b5f4d;
    --line:#d8cbb2; --hand:#42557f;
    --desk1:#cfd4dd; --desk2:#aeb5c2;
    --bw:min(960px,97vw); --bh:min(620px,80vh); --flip:1.1s;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Lora',Georgia,serif;color:var(--ink);
    background:radial-gradient(ellipse at 50% 30%,var(--desk1),var(--desk2));
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:14px 8px;overflow-x:hidden;}
  @media (prefers-reduced-motion: reduce){ :root{--flip:0s} *{transition:none!important;animation:none!important} }

  /* ===== página ===== */
  .pg{height:100%;padding:clamp(16px,3vw,36px) clamp(16px,3.2vw,40px);
    overflow:hidden;background:var(--paper);display:flex;flex-direction:column;position:relative}
  .eyebrow{font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:.45rem}
  .pg h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(1.25rem,2.4vw,1.7rem);line-height:1.15;margin-bottom:.7rem}
  .cont-tag{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:.85rem;margin-bottom:.6rem}

  .write{flex:1;min-height:0;width:100%;border:none;outline:none;
    background:repeating-linear-gradient(transparent 0 27px,var(--line) 27px 28px);
    background-attachment:local;overflow-y:auto;scrollbar-width:none;
    font-family:'Caveat',cursive;font-size:1.25rem;line-height:28px;color:var(--hand);padding:0 2px;
    white-space:pre-wrap;word-break:break-word;caret-color:var(--hand);}
  .write::-webkit-scrollbar{display:none}
  .write:empty::before{content:attr(data-ph);color:#b6a98e;pointer-events:none}
  .line-input{border:none;background:transparent;outline:none;width:100%;
    font-family:'Caveat',cursive;font-size:1.15rem;color:var(--hand);
    border-bottom:1.5px dashed var(--line);padding-bottom:2px;}
  .line-input.big{font-size:1.7rem;font-weight:600;margin-bottom:.7rem}
  .name-input{border:none;border-bottom:1.5px dashed var(--line);background:transparent;outline:none;
    font-family:'Caveat',cursive;font-size:1.3rem;color:var(--hand);width:9ch;text-align:center;}
  .write:focus-visible,.line-input:focus-visible,.name-input:focus-visible{outline:2px solid var(--foil);outline-offset:2px}

  /* pie de página: herramientas + acciones */
  .pgfoot{display:flex;gap:8px;align-items:center;padding-top:10px;flex-wrap:wrap}
  .tools{display:flex;gap:6px;align-items:center;margin-right:auto}
  .hl{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(60,50,30,.25);cursor:pointer;padding:0}
  .hl:hover{transform:scale(1.15)}
  .hl-erase{background:var(--paper);position:relative;font-size:11px;line-height:17px;color:var(--ink-soft)}
  .tool-btn{border:1px solid var(--line);background:transparent;border-radius:6px;
    width:24px;height:24px;cursor:pointer;font-size:13px;line-height:1;color:var(--ink-soft);
    display:inline-flex;align-items:center;justify-content:center;padding:0}
  .tool-btn:hover{border-color:var(--foil)}
  .tool-btn img{width:16px;height:16px;object-fit:contain;display:block;pointer-events:none}
  .mini-btn{font-family:'Lora',serif;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    border-radius:999px;padding:6px 12px;cursor:pointer;transition:all .18s;
    display:inline-flex;align-items:center;gap:5px}
  .mini-btn img{width:13px;height:13px;object-fit:contain;display:block}
  .mini-btn:hover{border-color:var(--foil);color:var(--ink)}
  .mini-btn.done-btn{border-color:var(--foil);color:#7a5f2e;background:rgba(201,169,106,.12)}
  .mini-btn.pulse{animation:btnpulse 1.6s ease-in-out infinite}
  @keyframes btnpulse{0%,100%{box-shadow:0 0 0 0 rgba(201,169,106,0)}50%{box-shadow:0 0 0 5px rgba(201,169,106,.25)}}
  .done-mark{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:#3f6b4f}

  /* post-its */
  .sticky{position:absolute;width:118px;min-height:104px;padding:16px 8px 8px;z-index:30;
    font-family:'Caveat',cursive;font-size:1.02rem;line-height:1.25;color:#4a3d20;
    box-shadow:2px 5px 12px rgba(40,30,10,.3);transform:rotate(-2deg);touch-action:none}
  .sticky:nth-child(even){transform:rotate(1.7deg)}
  .sticky .grip{position:absolute;top:0;left:0;right:0;height:15px;cursor:grab;
    background:linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,0))}
  .sticky .del{position:absolute;top:-1px;right:2px;border:none;background:none;cursor:pointer;
    font-size:12px;color:rgba(0,0,0,.4);line-height:15px;padding:0 3px}
  .sticky .del:hover{color:rgba(0,0,0,.8)}
  .sticky .recolor{position:absolute;top:1.5px;left:3px;cursor:pointer;
    width:11px;height:11px;border-radius:50%;padding:0;border:1px solid rgba(0,0,0,.3);
    box-shadow:0 0 0 1px rgba(255,255,255,.4) inset}
  .sticky .stxt{outline:none;min-height:72px;word-break:break-word}
  .sticky .stxt:empty::before{content:'escribe…';color:rgba(0,0,0,.3)}

  /* portada */
  .cover-page{height:100%;cursor:pointer;
    background:radial-gradient(ellipse at 30% 18%,rgba(255,255,255,.08),transparent 60%),
      repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 2px,transparent 2px 5px),var(--cover);
    display:flex;align-items:center;justify-content:center;}
  .cover-inner{position:relative;border:1.5px solid var(--foil);border-radius:4px;margin:7%;
    width:86%;height:86%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--foil);padding:6% 8%;
    box-shadow:inset 0 0 0 4px var(--cover), inset 0 0 0 5px rgba(201,169,106,.4);}
  .corner{position:absolute;width:clamp(52px,9vw,84px);height:clamp(52px,9vw,84px);opacity:.95;object-fit:contain;pointer-events:none}
  .c-tl{top:6px;left:6px}.c-tr{top:6px;right:6px;transform:scaleX(-1)}
  .c-bl{bottom:6px;left:6px;transform:scaleY(-1)}.c-br{bottom:6px;right:6px;transform:scale(-1,-1)}
  .cover-inner h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(1.5rem,3.2vw,2.3rem);
    line-height:1.15;letter-spacing:.05em;text-transform:uppercase;}
  .cover-inner .hint{margin-top:1.6rem;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;opacity:.65;animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
  .sprites{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:1.2rem}
  .sprites img{filter:drop-shadow(0 4px 6px rgba(0,0,0,.35))}
  .sprites .sp-el{height:clamp(88px,15vh,132px)}
  .sprites .sp-helen{height:clamp(84px,14.3vh,126px)}
  .dark-page{background:var(--cover-deep);height:100%}
  .dedic{color:var(--foil);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12%}
  .dedic p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;line-height:1.8}
  .newday{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1rem}
  .newday h2{margin:0}
  .newday-btn{font-family:'Lora',serif;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
    border:1.5px solid var(--foil);background:rgba(201,169,106,.12);color:#7a5f2e;
    border-radius:999px;padding:12px 26px;cursor:pointer;transition:all .2s}
  .newday-btn:hover{background:rgba(201,169,106,.28)}

  /* índice */
  .idx-list{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none}
  .idx-list::-webkit-scrollbar{display:none}
  .idx-day{margin-bottom:1.1rem}
  .idx-daytag{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:.95rem;margin-bottom:.25rem}
  .idx-link{display:flex;width:100%;align-items:baseline;gap:8px;background:none;border:none;
    border-bottom:1px dashed var(--line);padding:7px 2px;font-family:'Lora',serif;font-size:.85rem;
    color:var(--ink);cursor:pointer;text-align:left}
  .idx-link:hover{color:#7a5f2e}
  .idx-link .idx-label{flex:1}
  .idx-link .idx-num{color:var(--ink-soft);font-size:.72rem}
  .idx-empty{color:var(--ink-soft);font-style:italic;font-size:.85rem}
  .pgnum{position:absolute;bottom:9px;right:14px;font-size:.62rem;letter-spacing:.06em;color:var(--ink-soft);opacity:.65}

  /* fotos como stickers */
  .photo-sticker{background:#fff;padding:6px 6px 8px;border-radius:3px;box-shadow:0 6px 16px rgba(0,0,0,.28);
    transform:rotate(var(--rot,0deg));width:auto}
  .photo-img{display:block;max-width:150px;max-height:150px;border-radius:1px}
  .photo-grip{cursor:grab}

  /* popover de selección de color (crear post-it / recolorear) */
  .color-popover{position:absolute;z-index:200;background:var(--paper);border:1px solid var(--line);
    border-radius:10px;padding:10px;box-shadow:0 10px 26px rgba(20,20,10,.28);display:none;
    flex-direction:column;gap:8px;min-width:150px}
  .color-popover.open{display:flex}
  .color-popover .cp-title{font-family:'Lora',serif;font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
  .color-popover .cp-title img{width:13px;height:13px;object-fit:contain}
  .color-popover .cp-swatches{display:flex;gap:7px;align-items:center}
  .csw{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(0,0,0,.28);cursor:pointer;padding:0;flex:none}
  .csw:hover{transform:scale(1.12)}
  .csw.custom{background:#fff;border:1px dashed var(--ink-soft);display:flex;align-items:center;justify-content:center;
    font-size:12px;line-height:1;color:var(--ink-soft);overflow:hidden;position:relative}
  .custom-color-input{position:absolute;inset:-2px;opacity:0;cursor:pointer;border:none;padding:0;width:120%;height:120%}

  /* deshacer */
  .undo-btn{background:none;border:1px solid var(--line);border-radius:999px;padding:4px 10px;
    font-family:'Lora',serif;font-size:.72rem;color:var(--ink-soft);cursor:pointer}
  .undo-btn:hover{color:var(--ink);border-color:var(--ink-soft)}
  .undo-btn:disabled{opacity:.4;cursor:default}

  /* ===== libro 3D (PC) ===== */
  .scene{perspective:2400px;width:var(--bw);height:var(--bh);position:relative}
  .book{width:100%;height:100%;position:relative;transform-style:preserve-3d}
  .base{position:absolute;right:0;top:0;width:50%;height:100%;background:var(--cover-deep);
    border-radius:6px 14px 14px 6px;box-shadow:0 24px 60px rgba(20,25,45,.5),0 4px 12px rgba(20,25,45,.35);}
  .base::before{content:"";position:absolute;inset:6px 6px 6px 0;
    background:repeating-linear-gradient(to right,#f6efe0 0 2px,#e6dcc6 2px 4px);border-radius:0 8px 8px 0;}
  .leaf{position:absolute;right:0;top:0;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;}
  .leaf.flipped{transform:rotateY(-180deg)}
  .leaf.anim-f{animation:flipF var(--flip) cubic-bezier(.4,.08,.26,1) both}
  .leaf.anim-b{animation:flipB var(--flip) cubic-bezier(.4,.08,.26,1) both}
  @keyframes flipF{0%{transform:rotateY(0)}55%{transform:rotateY(-104deg)}88%{transform:rotateY(-177.5deg)}94%{transform:rotateY(-182deg)}100%{transform:rotateY(-180deg)}}
  @keyframes flipB{0%{transform:rotateY(-180deg)}55%{transform:rotateY(-76deg)}88%{transform:rotateY(-2.5deg)}94%{transform:rotateY(1.5deg)}100%{transform:rotateY(0)}}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;border-radius:2px 10px 10px 2px;background:var(--paper)}
  .face.back{transform:rotateY(180deg);border-radius:10px 2px 2px 10px}
  .face.paper::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to right,rgba(60,60,90,.15),rgba(60,60,90,0) 9%);}
  .face.back.paper::after{background:linear-gradient(to left,rgba(60,60,90,.15),rgba(60,60,90,0) 9%)}
  .face>*:not(.shade){height:100%}
  .shade{position:absolute;inset:0;pointer-events:none;opacity:0}
  .front .shade{background:linear-gradient(to left,rgba(15,12,4,.38),rgba(15,12,4,.04) 65%)}
  .back .shade{background:linear-gradient(to right,rgba(15,12,4,.38),rgba(15,12,4,.04) 65%)}
  .leaf.anim-f .front .shade{animation:shA var(--flip) both}
  .leaf.anim-f .back .shade{animation:shB var(--flip) both}
  .leaf.anim-b .front .shade{animation:shB var(--flip) both}
  .leaf.anim-b .back .shade{animation:shA var(--flip) both}
  @keyframes shA{0%{opacity:0}48%{opacity:.95}56%{opacity:.95}100%{opacity:0}}
  @keyframes shB{0%{opacity:.95}50%{opacity:.95}100%{opacity:0}}
  .cast{position:absolute;top:0;height:100%;width:50%;pointer-events:none;opacity:0;z-index:60}
  .cast-r{right:0;background:linear-gradient(to left,rgba(10,12,30,.02),rgba(10,12,30,.30) 92%)}
  .cast-l{left:0;background:linear-gradient(to right,rgba(10,12,30,.02),rgba(10,12,30,.30) 92%)}
  .book.tf .cast-r{animation:castOut var(--flip) both}
  .book.tf .cast-l{animation:castIn var(--flip) both}
  .book.tb .cast-l{animation:castOut var(--flip) both}
  .book.tb .cast-r{animation:castIn var(--flip) both}
  @keyframes castOut{0%{opacity:0}30%{opacity:.9}58%{opacity:0}100%{opacity:0}}
  @keyframes castIn{0%{opacity:0}52%{opacity:0}76%{opacity:.9}100%{opacity:0}}

  /* ===== libro móvil ===== */
  .mobile-book{display:none;width:min(480px,96vw);height:min(78dvh,760px);position:relative;
    border-radius:12px;box-shadow:0 18px 44px rgba(20,25,45,.45);overflow:hidden;background:var(--cover-deep);touch-action:pan-y}
  .mpage{position:absolute;inset:0;will-change:transform;background:var(--paper);transform-origin:0% 100%}
  .mpage>*:not(.dim){height:100%}
  .dim{position:absolute;inset:0;background:#0a0c1e;pointer-events:none;opacity:0}

  .controls{display:flex;align-items:center;gap:14px;margin-top:14px}
  .nav-btn{font-family:'Lora',serif;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
    background:var(--paper);color:var(--ink);border:1px solid var(--line);border-radius:999px;
    padding:9px 20px;cursor:pointer;box-shadow:0 3px 10px rgba(30,35,60,.2);transition:transform .15s,opacity .2s;}
  .nav-btn:hover{transform:translateY(-1px)}
  .nav-btn:disabled{opacity:.35;cursor:default;transform:none}
  .nav-btn:focus-visible,.mini-btn:focus-visible,.hl:focus-visible,.tool-btn:focus-visible,.newday-btn:focus-visible{outline:2px solid var(--foil);outline-offset:2px}
  .status{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#4d5568;min-width:104px;text-align:center}
  .status.saving{color:#8a6d3b}.status.ok{color:#3f6b4f}.status.err{color:#9c4a3a}
  .swipe-hint{margin-top:8px;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#5b6273;display:none}
  @media (max-width:700px){
    .scene{display:none}.mobile-book{display:block}.swipe-hint{display:block}
    .pg{padding:18px 16px calc(12px + env(safe-area-inset-bottom))}
    body{padding:0;justify-content:flex-start}
    .mobile-book{width:100vw;width:100dvw;height:100vh;height:100dvh;border-radius:0;box-shadow:none;max-width:none}
    #prevB,#nextB{display:none}
    .controls{position:fixed;bottom:calc(8px + env(safe-area-inset-bottom));left:0;right:0;
      justify-content:center;margin-top:0;pointer-events:none;z-index:80}
    .controls .status{pointer-events:auto;background:rgba(0,0,0,.35);color:#fff;border-radius:999px;padding:4px 12px;min-width:0}
    .controls .undo-btn{pointer-events:auto;background:rgba(0,0,0,.35);color:#fff;border-color:rgba(255,255,255,.4)}
    .swipe-hint{position:fixed;top:calc(8px + env(safe-area-inset-top));left:0;right:0;text-align:center;
      color:rgba(255,255,255,.55);z-index:80;pointer-events:none}
  }

  /* ===== Biblia: lomo, lector y citas ===== */
  .bible-spine{position:fixed;left:14px;top:50%;transform:translateY(-50%);
    width:52px;height:236px;border:none;cursor:pointer;z-index:70;padding:0;
    background:linear-gradient(90deg,var(--cover-deep),var(--cover) 42%,var(--cover) 58%,var(--cover-deep));
    border-radius:4px 9px 9px 4px;box-shadow:0 14px 30px rgba(20,25,45,.4),inset 0 0 0 1px rgba(201,169,106,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:var(--foil);transition:transform .18s,box-shadow .18s}
  .bible-spine:hover{transform:translateY(-50%) translateX(3px);box-shadow:0 16px 34px rgba(20,25,45,.5),inset 0 0 0 1px rgba(201,169,106,.85)}
  .bible-spine::before{content:"";position:absolute;inset:5px 6px;border:1px solid rgba(201,169,106,.35);border-radius:3px;pointer-events:none}
  .bible-spine-title{writing-mode:vertical-rl;transform:rotate(180deg);font-family:'Cormorant Garamond',serif;
    font-weight:600;font-size:1.05rem;letter-spacing:.2em;text-transform:uppercase}
  .bible-spine-sub{writing-mode:vertical-rl;transform:rotate(180deg);font-size:.52rem;letter-spacing:.24em;opacity:.72}
  .bible-open-m{display:none}

  /* lector de la Biblia */
  .reader{position:fixed;inset:0;z-index:300;display:none;background:rgba(15,20,35,.55);
    align-items:center;justify-content:center;padding:14px}
  .reader.open{display:flex}
  .reader-panel{width:min(680px,96vw);height:min(90vh,900px);background:var(--paper);
    border-radius:10px;box-shadow:0 30px 70px rgba(10,15,30,.55),inset 0 0 0 1px rgba(201,169,106,.4);
    display:flex;flex-direction:column;overflow:hidden}
  .reader-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
    background:var(--cover);color:var(--foil)}
  .reader-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;letter-spacing:.04em}
  .reader-ver{font-family:'Lora',serif;font-style:italic;font-size:.72rem;opacity:.82;margin-left:8px}
  .reader-x{background:none;border:1px solid rgba(201,169,106,.5);color:var(--foil);border-radius:50%;
    width:28px;height:28px;cursor:pointer;font-size:12px;line-height:1;flex:none}
  .reader-x:hover{background:rgba(201,169,106,.18)}
  .reader-nav{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
  .rd-select{font-family:'Lora',serif;font-size:.85rem;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:8px;padding:8px 9px;cursor:pointer;flex:1;min-width:0}
  .rd-select.rd-ch{flex:0 0 88px}
  .rd-arrow{border:1px solid var(--line);background:transparent;border-radius:8px;width:36px;height:36px;
    cursor:pointer;font-size:17px;color:var(--ink-soft);flex:none}
  .rd-arrow:hover{border-color:var(--foil);color:var(--ink)}
  .rd-arrow:disabled{opacity:.35;cursor:default}
  .reader-body{flex:1;min-height:0;overflow-y:auto;padding:18px 22px 26px;
    font-family:'Lora',serif;font-size:1.02rem;line-height:1.9;color:var(--ink)}
  .r-chaptitle{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:.7rem;color:#4a3f2c}
  .verse{cursor:pointer;border-radius:4px;padding:1px 3px;transition:background .12s}
  .verse:hover{background:rgba(201,169,106,.12)}
  .verse.sel{background:rgba(201,169,106,.34)}
  .vnum{font-size:.62rem;color:#a9884e;font-weight:600;vertical-align:super;margin-right:2px}
  .reader-citebar{display:none;align-items:center;gap:10px;padding:12px 16px;
    border-top:1px solid var(--line);background:rgba(201,169,106,.09);flex-wrap:wrap}
  .reader-citebar.on{display:flex}
  #readerCiteLabel{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:.95rem;margin-right:auto}
  .rd-cite-btn{font-family:'Lora',serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;

const MAIN_BOOK_ID='creciendo-en-la-palabra';

  {id:'contexto', label:'Contexto', ph:'Quién escribe, a quién y por qué…'},
  {id:'entendi', label:'Lo que entendí hoy', ph:'Lo que Dios me mostró en este pasaje…'},
  {id:'versiculo', label:'Un versículo para recordar', ph:'El versículo y por qué lo escogimos…'},
  {id:'oracion', label:'Una oración', ph:'Nuestra oración de hoy…'},
  {id:'notas1', label:'Mis notas', kind:'notas', nameKey:'n1'},
  {id:'notas2', label:'Mis notas', kind:'notas', nameKey:'n2'},
];

let state={__meta:{days:[{pages:{},done:{},free:{}}],stickies:[]}};
const meta=()=>state.__meta;
const dayMeta=d=>meta().days[d];
const pcount=(d,id)=>dayMeta(d).pages[id]||1;
const kp=(d,id,p)=>`d${d}_${id}_p${p}`;
const isFree=(d,id)=>!!(dayMeta(d).free&&dayMeta(d).free[id]);

/* ---- páginas ---- */
let PAGES=[];
let INDEX_ENTRIES=[];
function buildPages(){
  PAGES=[];
  PAGES.push({type:'cover'});
  PAGES.push({type:'dark', html:`<div class="dark-page"><div class="dedic">
      <p>«Y si alguno prevaleciere contra uno,<br>dos le resistirán;<br>y cordón de tres dobleces<br>no se rompe pronto.»</p>
      <p style="margin-top:1.4rem;font-size:.95rem;opacity:.8">— Eclesiastés 4:12 (RVR1960)</p>
    </div></div>`});
  PAGES.push({type:'index'});
  meta().days.forEach((dm,d)=>{
    SECTIONS.forEach(sec=>{
      const n=pcount(d,sec.id);
      for(let p=0;p<n;p++)PAGES.push({type:'sec',d,sec,p,last:p===n-1});
    });
  });
  PAGES.push({type:'newday'});
  PAGES.push({type:'dark', html:`<div class="dark-page"><div class="dedic">
      <p>✦<br><br>«Antes bien, creced en la gracia<br>y el conocimiento de nuestro<br>Señor y Salvador Jesucristo.<br>A él sea gloria ahora y hasta<br>el día de la eternidad. Amén.»<br><br>2 Pedro 3:18 (RVR1960)</p>
    </div></div>`});
  if(PAGES.length%2)PAGES.push({type:'blank'});

  INDEX_ENTRIES=meta().days.map((dm,d)=>{
    const items=SECTIONS.map(sec=>{
      const idx=PAGES.findIndex(pg=>pg.type==='sec'&&pg.d===d&&pg.sec.id===sec.id&&pg.p===0);
      return idx>=0?{label:sec.label,idx}:null;
    }).filter(Boolean);
    return {tag:`Día ${d+1}`,items};
  });
}

function toolsHTML(pid){
  return `<span class="tools">
    ${HL_COLORS.map(c=>`<button class="hl" data-hl="${c}" style="background:${c}" title="Resaltar" aria-label="Resaltar en color"></button>`).join('')}
    <button class="hl hl-erase" data-hl="erase" title="Quitar resaltado" aria-label="Quitar resaltado">⊘</button>
    <button class="tool-btn" data-action="sticky" data-pid="${pid}" title="Pegar post-it" aria-label="Pegar post-it"><img src="${ICON_STICKY}" alt=""></button>
    <label class="tool-btn photo-btn" title="Subir foto" aria-label="Subir foto"><img src="${ICON_PHOTO}" alt=""><input type="file" accept="image/*" class="photo-input" data-pid="${pid}" hidden></label>
    <button class="tool-btn cite-btn" data-action="cite" data-pid="${pid}" title="Citar un versículo de la Biblia" aria-label="Citar un versículo">✝</button>
    <button class="tool-btn marker-btn" data-action="marker" data-pid="${pid}" title="Dibujar con marcador" aria-label="Dibujar con marcador">✎</button>
  </span>`;
}

      w.innerHTML=`<div class="cover-page has-cover" data-open role="button" tabindex="0" aria-label="Abrir el libro"

        <button class="mini-btn cover-add floating" data-action="setcover">＋ Cambiar portada</button>
        <div class="hint on-cover">Toca para abrir</div>

      </div>
      ${pgnum}
    </div>`;
    renderStickies(w.firstElementChild,pid);
  }
  return w.firstElementChild;

/* ---------- post-its y fotos ---------- */
function stickyEl(s){
  const el=document.createElement('div');
  el.dataset.sid=s.id;
  el.style.left=s.x+'%';el.style.top=s.y+'%';
  if(s.type==='photo'){
    el.className='sticky photo-sticker';
    el.style.setProperty('--rot',(s.rot||0)+'deg');
    if(s.w){el.style.width=s.w+'%';el.classList.add('sized');}
    el.innerHTML=`<div class="grip photo-grip"></div><button class="del" aria-label="Quitar foto">✕</button>
      <img src="${s.src}" class="photo-img" draggable="false" alt="">
      <div class="resize" title="Cambiar tamaño" aria-label="Cambiar tamaño de la foto"></div>`;
  }else{
    el.className='sticky';el.style.background=s.c;
    el.innerHTML=`<div class="grip"></div><button class="del" aria-label="Quitar post-it">✕</button>
      <button class="recolor" style="background:${s.c}" data-action="recolor" title="Cambiar color" aria-label="Cambiar color de este post-it"></button>
      <div class="stxt" contenteditable="true"></div>`;
    el.querySelector('.stxt').innerText=s.text||'';
  }
  return el;
}
function renderStickies(pgEl,pid){
  pgEl.querySelectorAll('.sticky').forEach(x=>x.remove());
  meta().stickies.filter(s=>s.pid===pid).forEach(s=>pgEl.appendChild(stickyEl(s)));
}
function refreshStickies(pid){
  document.querySelectorAll(`.pg[data-pid="${pid}"]`).forEach(pg=>renderStickies(pg,pid));
}

/* ================= construir vistas ================= */
const book=document.getElementById('book');
const mbook=document.getElementById('mbook');
let leaves=[],mpages=[];
let dcur=0,mcur=0,dbusy=false,mbusy=false;
const noMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const isMobile=()=>window.matchMedia('(max-width:700px)').matches;

function rebuild(){
  buildPages();
  book.innerHTML='<div class="base"></div>';
  leaves=[];
  for(let i=0;i<PAGES.length;i+=2){
    const leaf=document.createElement('div');leaf.className='leaf';
    const f=document.createElement('div');f.className='face front';
    const b=document.createElement('div');b.className='face back';
    const pf=PAGES[i],pb=PAGES[i+1];
    if(pf.type!=='cover'&&pf.type!=='dark')f.classList.add('paper');
    if(pb&&pb.type!=='cover'&&pb.type!=='dark')b.classList.add('paper');
    f.appendChild(pageEl(pf,i));
    if(pb)b.appendChild(pageEl(pb,i+1));
    const s1=document.createElement('div');s1.className='shade';
    const s2=document.createElement('div');s2.className='shade';
    f.appendChild(s1);b.appendChild(s2);
    leaf.append(f,b);book.appendChild(leaf);leaves.push(leaf);
  }
  const cr=document.createElement('div');cr.className='cast cast-r';
  const cl=document.createElement('div');cl.className='cast cast-l';
  book.append(cr,cl);
  dcur=Math.min(dcur,leaves.length);
  leaves.forEach((l,i)=>l.classList.toggle('flipped',i<dcur));
  dz();
  mbook.innerHTML='';
  mpages=PAGES.map((d,i)=>{
    const el=document.createElement('div');el.className='mpage';
    el.appendChild(pageEl(d,i));
    const dim=document.createElement('div');dim.className='dim';
    el.appendChild(dim);mbook.appendChild(el);return el;
  });
  mcur=Math.min(mcur,PAGES.length-1);
  mRender();
  fill();ui();
}

/* ---------- PC ---------- */
function dz(){leaves.forEach((l,i)=>l.style.zIndex=l.classList.contains('flipped')?i+1:leaves.length-i+1)}
function dTurn(fwd){
  if(dbusy)return;
  const leaf=fwd?leaves[dcur]:leaves[dcur-1];
  if(!leaf)return;
  if(noMotion){leaf.classList.toggle('flipped',fwd);dcur+=fwd?1:-1;dz();ui();return;}
  dbusy=true;leaf.style.zIndex=99;
  book.classList.add(fwd?'tf':'tb');
  leaf.classList.add(fwd?'anim-f':'anim-b');
  leaf.classList.toggle('flipped',fwd);
  leaf.addEventListener('animationend',()=>{
    leaf.classList.remove('anim-f','anim-b');
    book.classList.remove('tf','tb');
    dcur+=fwd?1:-1;dz();dbusy=false;ui();
  },{once:true});
}
const dNext=()=>{if(dcur<leaves.length)dTurn(true)};
const dPrev=()=>{if(dcur>0)dTurn(false)};

/* ---------- móvil ---------- */
const mdim=i=>mpages[i].lastElementChild;
const EASE='transform .38s cubic-bezier(.22,.61,.36,1)';
function setP(i,p){
  const el=mpages[i];
  el.style.transform=`translateX(${-p*106}%) rotate(${-p*3.2}deg)`;
  el.style.boxShadow=p>0?`${-6-18*p}px 4px ${16+26*p}px rgba(15,18,40,${.22+.24*p})`:'none';
}
function mRender(){
  mpages.forEach((el,i)=>{
    el.style.transition='none';
    setP(i,i<mcur?1:0);
    el.style.zIndex=i<mcur?600+i:500-(i-mcur);
    mdim(i).style.transition='none';
    mdim(i).style.opacity=i>mcur?.38:0;
    el.style.pointerEvents=i===mcur?'auto':'none';
    el.setAttribute('aria-hidden',i===mcur?'false':'true');
  });
}
function mSettle(dir,commit){
  mbusy=true;
  const turning=dir===1?mcur:mcur-1;
  const under=dir===1?mcur+1:mcur;
  const el=mpages[turning],dm=mdim(under);
  el.style.transition=EASE+',box-shadow .38s';
  dm.style.transition='opacity .38s ease';
  requestAnimationFrame(()=>{
    setP(turning,dir===1?(commit?1:0):(commit?0:1));
    dm.style.opacity=dir===1?(commit?0:.38):(commit?.38:0);
    setTimeout(()=>{if(commit)mcur+=dir;mRender();mbusy=false;ui();},400);
  });
}
const mNext=()=>{if(!mbusy&&mcur<PAGES.length-1){mRender();mSettle(1,true);}};
const mPrev=()=>{if(!mbusy&&mcur>0){mRender();mSettle(-1,true);}};

let sx=null,sy=null,mode=0,lastX=0,lastT=0,vel=0;
mbook.addEventListener('touchstart',e=>{
  if(mbusy||e.target.closest('.sticky'))return;
  sx=e.touches[0].clientX;sy=e.touches[0].clientY;lastX=sx;lastT=e.timeStamp;mode=0;vel=0;
},{passive:true});
mbook.addEventListener('touchmove',e=>{
  if(sx===null||mbusy)return;
  const x=e.touches[0].clientX,y=e.touches[0].clientY;
  const dx=x-sx,dy=y-sy;
  vel=(x-lastX)/Math.max(1,e.timeStamp-lastT);lastX=x;lastT=e.timeStamp;
  if(!mode){
    if(Math.abs(dx)<10||Math.abs(dx)<Math.abs(dy)*1.2)return;
    if(dx<0&&mcur<PAGES.length-1)mode=1;else if(dx>0&&mcur>0)mode=-1;else return;
    mRender();
  }
  const W=mbook.clientWidth;
  if(mode===1){
    const p=Math.min(1,Math.max(0,-dx/W));
    mpages[mcur].style.transition='none';setP(mcur,p);
    mdim(mcur+1).style.transition='none';mdim(mcur+1).style.opacity=.38*(1-p);
  }else{
    const p=Math.min(1,Math.max(0,dx/W));
    mpages[mcur-1].style.transition='none';setP(mcur-1,1-p);
    mdim(mcur).style.transition='none';mdim(mcur).style.opacity=.38*p;
  }
},{passive:true});
mbook.addEventListener('touchend',e=>{
  if(sx===null)return;
  if(mode){
    const W=mbook.clientWidth;
    const dx=e.changedTouches[0].clientX-sx;
    const p=Math.abs(dx)/W;
    const fast=Math.abs(vel)>.45&&Math.sign(vel)===(mode===1?-1:1);
    mSettle(mode===1?1:-1,p>.26||fast);
  }
  sx=sy=null;mode=0;ui();
},{passive:true});

function pos(){return isMobile()?mcur:dcur}
function total(){return isMobile()?PAGES.length-1:leaves.length}
function ui(){
  prevB.disabled=pos()===0;
  nextB.disabled=pos()===total();
  nextB.textContent=pos()===0?'Abrir ›':'Siguiente ›';

function goTo(p){

  dcur=Math.ceil(mcur/2);
  leaves.forEach((l,i)=>l.classList.toggle('flipped',i<dcur));

/* ---------- acciones ---------- */
function pageIndexOf(fn){for(let i=0;i<PAGES.length;i++)if(fn(PAGES[i]))return i;return 0;}
const secStart=(d,id)=>pageIndexOf(pg=>pg.type==='sec'&&pg.d===d&&pg.sec.id===id&&pg.p===0);
function pageEmpty(pid){
  const v=state[pid];
  const hasText=v&&String(v).replace(/<[^>]*>/g,'').trim();
  const hasInk=getStrokes(pid).length>0;
  const hasSticky=meta().stickies.some(s=>s.pid===pid);
  return !hasText&&!hasInk&&!hasSticky;
}

document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const act=btn.dataset.action;
  if(act==='add'){
    pushUndo();
    const d=+btn.dataset.d,id=btn.dataset.sec;
    dayMeta(d).pages[id]=pcount(d,id)+1;
    markDirty('__meta');
    queueSave();rebuild();
    goTo(secStart(d,id)+pcount(d,id)-1);
  }else if(act==='done'){
    pushUndo();
    const d=+btn.dataset.d,id=btn.dataset.sec;
    let n=pcount(d,id);
    while(n>1&&pageEmpty(kp(d,id,n-1))){
      const pk=kp(d,id,n-1);
      delete state[pk];deletedKeys.add(pk);
      delete state[inkKey(pk)];deletedKeys.add(inkKey(pk));
      meta().stickies=meta().stickies.filter(s=>s.pid!==pk);
      n--;
    }
    dayMeta(d).pages[id]=n;
    dayMeta(d).done[id]=true;
    markDirty('__meta');
    queueSave();
    const i=SECTIONS.findIndex(s=>s.id===id);
    const next=SECTIONS[i+1];
    rebuild();
    if(next)goTo(secStart(d,next.id));
    else if(meta().days[d+1])goTo(secStart(d+1,'lectura'));
    else goTo(pageIndexOf(pg=>pg.type==='newday'));
  }else if(act==='delpage'){
    pushUndo();
    const d=+btn.dataset.d,id=btn.dataset.sec,p=+btn.dataset.p;
    const pid=kp(d,id,p);
    if(!pageEmpty(pid)&&!confirm('Esta página tiene contenido. ¿Seguro que quieres eliminarla?')){undoStack.pop();return;}
    delete state[pid];deletedKeys.add(pid);
    delete state[inkKey(pid)];deletedKeys.add(inkKey(pid));
    meta().stickies=meta().stickies.filter(s=>s.pid!==pid);
    dayMeta(d).pages[id]=p;
    markDirty('__meta');
    queueSave();rebuild();
    goTo(secStart(d,id));
  }else if(act==='newday'){
    pushUndo();
    meta().days.push({pages:{},done:{},free:{}});
    markDirty('__meta');
    queueSave();rebuild();
    goTo(secStart(meta().days.length-1,'lectura'));
  }else if(act==='sticky'){
    openPopover(btn,'create',btn.dataset.pid);
  }else if(act==='recolor'){
    const el=btn.closest('.sticky');
    openPopover(btn,'recolor',el.dataset.sid);
  }else if(act==='marker'){
    if(inkMode&&inkMode.pid===btn.dataset.pid){exitInk();}
    else openPopover(btn,'marker',btn.dataset.pid);
  }else if(act==='setcover'){
    pendingCoverBook=currentBookId;
    document.getElementById('coverInput').click();
  }else if(act==='togglefree'){
    pushUndo();
    const d=+btn.dataset.d,id=btn.dataset.sec;
    if(!dayMeta(d).free)dayMeta(d).free={};
    dayMeta(d).free[id]=!dayMeta(d).free[id];
    markDirty('__meta');
    queueSave();rebuild();
  }else if(act==='goto'){
    goTo(+btn.dataset.idx);
  }
});

function emojiTokens(str){

function buildMarkerPanel(){

const SPINE_COLORS=['#1c2b47','#5a2a2a','#2f5a3a','#6b4a8a','#8a5a2a','#faf6ec'];
let popoverBook=null;
function openPopover(anchorEl,mode,payload){
  popoverMode=mode;
  popoverPid=(mode==='create'||mode==='marker')?payload:null;
  popoverSid=mode==='recolor'?payload:null;
  popoverBook=mode==='spine'?payload:null;
  cpIcon.src=ICON_PALETTE;
  const currentColor=mode==='recolor'?(meta().stickies.find(s=>s.id===popoverSid)||{}).c:
    (mode==='spine'?((libEntry(popoverBook)||{}).sc||'#faf6ec'):null);
  popoverEl.classList.toggle('marker',mode==='marker');
  if(mode==='marker')buildMarkerPanel();
  else if(mode==='spine')buildSwatches(SPINE_COLORS,currentColor,false);
  else buildSwatches(STICKY_COLORS,currentColor,false);
  const r=anchorEl.getBoundingClientRect();
  popoverEl.classList.add('open');
  const pw=popoverEl.offsetWidth||160, ph=popoverEl.offsetHeight||70;
  let left=r.left+window.scrollX;
  let top=r.bottom+window.scrollY+6;
  const maxLeft=window.scrollX+document.documentElement.clientWidth-pw-8;
  const maxTop=window.scrollY+document.documentElement.clientHeight-ph-8;
  if(left>maxLeft)left=Math.max(8,maxLeft);
  if(top>maxTop)top=r.top+window.scrollY-ph-6;
  popoverEl.style.left=left+'px';
  popoverEl.style.top=top+'px';
}
function closePopover(){
  popoverEl.classList.remove('open','marker');
  popoverMode=null;popoverPid=null;popoverSid=null;popoverBook=null;
}
function applyPopoverColor(color){
  if(popoverMode==='spine'&&popoverBook){
    const en=libEntry(popoverBook);
    if(en){en.sc=color;saveLibrary().then(()=>renderShelf());renderShelf();}
    closePopover();return;
  }
  if(popoverMode==='marker'&&popoverPid){
    setInk(popoverPid,color,false);
    closePopover();return;
  }
  if(popoverMode==='create'&&popoverPid){
    pushUndo();
    meta().stickies.push({
      id:'s'+Date.now()+Math.floor(Math.random()*999),
      pid:popoverPid, x:8+Math.random()*40, y:12+Math.random()*35,

}

function shrink(img,maxDim,q){
  let w=img.width,h=img.height;
  if(w>=h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
  else if(h>w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c.toDataURL('image/jpeg',q);
}

/* ---------- marcador: dibujo a mano sobre la página ---------- */
function inkKey(pid){return 'ink_'+pid;}
function getStrokes(pid){
  try{return state[inkKey(pid)]?JSON.parse(state[inkKey(pid)]):[];}catch(e){return[];}
}
function setStrokes(pid,arr){
  if(arr.length)state[inkKey(pid)]=JSON.stringify(arr);
  else{delete state[inkKey(pid)];deletedKeys.add(inkKey(pid));}
  markDirty(inkKey(pid));
}
let inkMode=null; /* {pid,color,erase,tip,emojis} */
function setInk(pid,color,erase){
  exitInk();
  inkMode={pid,color,erase:!!erase,tip:markerTip,emojis:emojiTokens(markerEmojis)};
  document.querySelectorAll(`.pg[data-pid="${pid}"]`).forEach(pg=>pg.classList.add('inking'));
  document.querySelectorAll(`.marker-btn[data-pid="${pid}"]`).forEach(b=>{b.classList.add('active');b.title=erase?'Borrando… toca para salir':'Dibujando… toca para salir';});
  redrawInk(pid);
  const names={fina:'Marcador fino',gruesa:'Marcador grueso',resaltador:'Resaltador',crayola:'Crayola',patron:'Patrón de emojis'};
  toast(erase?'Borrador activo: toca los trazos para borrarlos':(names[markerTip]||'Marcador')+' activo: dibuja sobre la página');
}
function exitInk(){
  if(!inkMode)return;
  document.querySelectorAll('.pg.inking').forEach(pg=>pg.classList.remove('inking'));
  document.querySelectorAll('.marker-btn.active').forEach(b=>{b.classList.remove('active');b.title='Dibujar con marcador';});
  inkMode=null;
}
function j01(a,b){const v=Math.sin(a*127.1+b*311.7)*43758.5453;return v-Math.floor(v);}
function paintStroke(ctx,s,W,H){
  const t=s.t||'fina';
  const pts=[];
  for(let i=0;i<s.p.length;i+=2)pts.push([s.p[i]/1000*W,s.p[i+1]/1000*H]);
  if(!pts.length)return;
  if(t==='patron'){
    const em=(s.e&&s.e.length)?s.e:['❤️'];
    const size=Math.max(15,Math.min(26,W*0.032));
    ctx.globalAlpha=1;
    ctx.font=size+'px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const gap=size*1.15;
    let k=0;
    ctx.fillText(em[k++%em.length],pts[0][0],pts[0][1]);
    let traveled=0,target=gap;
    for(let i=1;i<pts.length;i++){
      const a=pts[i-1],b=pts[i];
      const L=Math.hypot(b[0]-a[0],b[1]-a[1]);
      while(L>0&&traveled+L>=target){
        const r=(target-traveled)/L;
        ctx.fillText(em[k++%em.length],a[0]+(b[0]-a[0])*r,a[1]+(b[1]-a[1])*r);
        target+=gap;
      }
      traveled+=L;
    }
    return;
  }
  const tracePath=(jitter,pass)=>{
    ctx.beginPath();
    for(let i=0;i<pts.length;i++){
      let x=pts[i][0],y=pts[i][1];
      if(jitter){x+=(j01(i,pass)-0.5)*3.2;y+=(j01(i,pass+7)-0.5)*3.2;}
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    if(pts.length===1)ctx.lineTo(pts[0][0]+.5,pts[0][1]+.5);
    ctx.stroke();
  };
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=s.c||'#3a3226';
  if(t==='crayola'){
    ctx.lineWidth=s.w||6;ctx.globalAlpha=.5;tracePath(false,0);
    for(let pass=1;pass<=2;pass++){ctx.lineWidth=(s.w||6)*.65;ctx.globalAlpha=.28;tracePath(true,pass);}
  }else if(t==='resaltador'){
    ctx.lineWidth=s.w||16;ctx.globalAlpha=.32;tracePath(false,0);
  }else{ /* fina, gruesa y trazos antiguos */
    ctx.lineWidth=s.w||3;ctx.globalAlpha=.9;tracePath(false,0);
  }
  ctx.globalAlpha=1;
}
function drawCanvas(cv){
  const pid=cv.dataset.pid,pg=cv.closest('.pg');
  if(!pg)return;
  const W=pg.clientWidth,H=pg.clientHeight;
  if(!W||!H)return;
  const dpr=window.devicePixelRatio||1;
  const pw=Math.round(W*dpr),ph=Math.round(H*dpr);
  if(cv.width!==pw||cv.height!==ph){cv.width=pw;cv.height=ph;}
  cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  getStrokes(pid).forEach(s=>paintStroke(ctx,s,W,H));
}
function redrawInk(pid){
  const sel=pid?`.ink[data-pid="${pid}"]`:'.ink';
  document.querySelectorAll(sel).forEach(drawCanvas);
}
let inkStroke=null,erasePushed=false;
function eraseAt(cv,x,y){
  const pid=cv.dataset.pid,arr=getStrokes(pid);
  const keep=arr.filter(s=>{
    for(let i=0;i<s.p.length;i+=2){
      if(Math.abs(s.p[i]-x)<28&&Math.abs(s.p[i+1]-y)<28)return false;
    }
    return true;
  });
  if(keep.length!==arr.length){
    if(!erasePushed){pushUndo();erasePushed=true;setTimeout(()=>erasePushed=false,1500);}
    setStrokes(pid,keep);
    redrawInk(pid);queueSave();
  }
}
document.addEventListener('pointerdown',e=>{
  const cv=e.target.closest('.ink');
  if(!cv||!inkMode||cv.dataset.pid!==inkMode.pid)return;
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const x=Math.round((e.clientX-r.left)/r.width*1000),y=Math.round((e.clientY-r.top)/r.height*1000);
  if(inkMode.erase){eraseAt(cv,x,y);inkStroke={erase:true,cv};return;}
  pushUndo();
  const def=MARKER_TIPS[inkMode.tip]||MARKER_TIPS.fina;
  const s={t:inkMode.tip,w:def.w,p:[x,y]};
  if(inkMode.tip==='patron')s.e=inkMode.emojis;
  else s.c=inkMode.color;
  inkStroke={cv,s};
  cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);

  const x=Math.round((e.clientX-r.left)/r.width*1000),y=Math.round((e.clientY-r.top)/r.height*1000);
  if(inkStroke.erase){eraseAt(cv,x,y);return;}
  const p=inkStroke.s.p,n=p.length;
  if(Math.abs(x-p[n-2])+Math.abs(y-p[n-1])<4)return;
  p.push(x,y);

});

/* ---------- guardado compartido (Firebase) ---------- */
const statusEl=document.getElementById('status');
let timer=null,loaded=false,lastSavedJson=null;
/* cambios locales aún no guardados: se protegen al fusionar con lo del otro */
let dirtyKeys=new Set(),deletedKeys=new Set();
function markDirty(k){dirtyKeys.add(k);}
function mergeRemote(incoming){
  dirtyKeys.forEach(k=>{
    if(k==='__meta')incoming.__meta=state.__meta;
    else if(k in state)incoming[k]=state[k];
  });
  deletedKeys.forEach(k=>{delete incoming[k];});
  return incoming;
}
let undoStack=[];
function pushUndo(){
  undoStack.push(JSON.stringify(state));
  if(undoStack.length>30)undoStack.shift();
  updateUndoBtn();
}
function performUndo(){
  if(!undoStack.length)return;
  state=migrate(JSON.parse(undoStack.pop()));
  if(!meta().stickies)meta().stickies=[];
  /* todo lo restaurado cuenta como cambio local pendiente */
  dirtyKeys=new Set(Object.keys(state));
  deletedKeys=new Set();
  rebuild();queueSave();
  updateUndoBtn();
  setStatus('Deshecho ↺','ok');setTimeout(()=>setStatus('\u00a0'),1500);
}
function updateUndoBtn(){const b=document.getElementById('undoB');if(b)b.disabled=!undoStack.length;}
function setStatus(t,cls){statusEl.textContent=t;statusEl.className='status '+(cls||'')}
function fill(){
  document.querySelectorAll('[data-k]').forEach(f=>{
    const v=state[f.dataset.k];
    if(v==null||document.activeElement===f)return;
    if(f.classList.contains('write')){if(f.innerHTML!==v)f.innerHTML=v;}
    else if(f.value!==v)f.value=v;
  });
  redrawInk();
}
function migrate(s){
  if(s.__meta&&s.__meta.days)return s;
  const old=s.__meta||{pages:{},done:{}};
  const ns={__meta:{days:[{pages:old.pages||{},done:old.done||{}}],stickies:[]}};
  Object.keys(s).forEach(k=>{
    if(k==='__meta')return;
    if(k==='dia')ns['d0_dia']=s[k];
    else if(k==='ref')ns['d0_ref']=s[k];
    else if(k==='n1'||k==='n2')ns[k]=s[k];
    else if(/_p\d+$/.test(k))ns['d0_'+k]=s[k];
    else ns[k]=s[k];
  });
  return ns;
}
async function load(){
  try{
    const snap=await cuadernoDoc.get();
    if(snap.exists&&snap.data().json){
      const incoming=migrate(JSON.parse(snap.data().json));
      state=mergeRemote(incoming);
    }
  }catch(e){console.error('Error al cargar de Firebase:',e)}
  if(!meta().stickies)meta().stickies=[];
  rebuild();
  loaded=true;setStatus('Cuaderno listo','ok');setTimeout(()=>setStatus('\u00a0'),2200);
}
function queueSave(){if(!loaded)return;setStatus('Guardando…','saving');clearTimeout(timer);timer=setTimeout(save,800);}
async function save(){
  const payload=JSON.stringify(state);
  lastSavedJson=payload;
  const savedKeys=[...dirtyKeys],savedDeleted=[...deletedKeys];
  try{
    await cuadernoDoc.set({json:payload,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    savedKeys.forEach(k=>dirtyKeys.delete(k));
    savedDeleted.forEach(k=>deletedKeys.delete(k));
    setStatus('Guardado ✓','ok');
  }catch(e){console.error('Error al guardar en Firebase:',e);setStatus('Sin conexión de guardado','err')}
  setTimeout(()=>{if(statusEl.classList.contains('ok'))setStatus('\u00a0')},2200);
}
/* deshacer por lotes: guarda un punto de retorno al empezar a escribir, no en cada letra */
let typingBatch=false,typingBatchTimer=null;
document.addEventListener('beforeinput',e=>{
  const f=e.target.closest('[data-k], .stxt');
  if(!f)return;
  if(!typingBatch){pushUndo();typingBatch=true;}
  clearTimeout(typingBatchTimer);
  typingBatchTimer=setTimeout(()=>{typingBatch=false;},1200);
});
document.addEventListener('input',e=>{
  const f=e.target.closest('[data-k]');
  if(!f)return;
  const val=f.classList.contains('write')?f.innerHTML:f.value;
  state[f.dataset.k]=val;
  markDirty(f.dataset.k);
  document.querySelectorAll(`[data-k="${f.dataset.k}"]`).forEach(o=>{
    if(o===f)return;
    if(o.classList.contains('write')){if(o.innerHTML!==val)o.innerHTML=val;}
    else if(o.value!==val)o.value=val;
  });
  if(f.classList.contains('write')&&f.scrollHeight>f.clientHeight+4){
    const b=f.closest('.pg')?.querySelector('[data-action="add"]');
    if(b)b.classList.add('pulse');

/* pegar solo texto plano en las áreas de escritura */
document.addEventListener('paste',e=>{
  const w=e.target.closest('.write, .stxt');
  if(!w)return;
  e.preventDefault();
  const t=(e.clipboardData||window.clipboardData).getData('text/plain');

});
/* sincronización en vivo: si la otra persona guarda algo, se FUSIONA con lo tuyo.
   Lo que tú tienes escrito y aún no se ha guardado (dirtyKeys) se conserva,
   así nadie borra el trabajo del otro al escribir al mismo tiempo. */
let unsubSnapshot=null;
function subscribeSnapshot(){
  let suppress=true; // el primer snapshot llega justo después de load(), lo ignoramos
  if(unsubSnapshot)unsubSnapshot();
  unsubSnapshot=cuadernoDoc.onSnapshot(snap=>{
    if(suppress){suppress=false;return;}
    if(!loaded||!snap.exists||!snap.data().json)return;
    const incomingJson=snap.data().json;
    if(incomingJson===lastSavedJson)return; // eco de nuestro propio guardado
    const incoming=migrate(JSON.parse(incomingJson));
    if(!incoming.__meta.stickies)incoming.__meta.stickies=[];
    state=mergeRemote(incoming);
    if(!meta().stickies)meta().stickies=[];
    const activeEditing=document.activeElement&&
      (document.activeElement.isContentEditable||document.activeElement.tagName==='INPUT');
    if(activeEditing){
      fill(); // rellena sin tocar el campo donde estás escribiendo
    }else{
      rebuild();
    }
    /* si teníamos cambios propios sin guardar, los volvemos a subir encima */
    if(dirtyKeys.size||deletedKeys.size)queueSave();
    setStatus('Actualizado ✓','ok');setTimeout(()=>setStatus('\u00a0'),2200);
  });
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&loaded)load();});
load();
subscribeSnapshot();
updateUndoBtn();

let library={books:[]}; /* [{id,title,cover}] */
const libraryDoc=db.collection('cuaderno').doc('biblioteca');
function libEntry(id){return library.books.find(b=>b.id===id);}
async function loadLibrary(){
  try{
    const s=await libraryDoc.get();
    if(s.exists&&Array.isArray(s.data().books))library.books=s.data().books;
  }catch(e){console.error('Error al cargar biblioteca:',e)}
  renderShelf();

async function saveLibrary(){
  try{await libraryDoc.set({books:library.books});}catch(e){console.error('Error al guardar biblioteca:',e)}

function spineDecls(b){
  if(b.cover)return `background-image:linear-gradient(rgba(20,25,45,.4),rgba(20,25,45,.4)),url('${b.cover}');background-size:cover;background-position:center;`;
  if(b.sc)return `background:linear-gradient(90deg,${shade(b.sc,-18)},${b.sc} 45%,${b.sc} 55%,${shade(b.sc,-18)});`;
  return '';
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function shelfH(id){return 118+hashStr(id)%34;}          /* 118–151 px, estable por libro */
function shelfW(id){return 30+hashStr(id+'w')%12;}       /* 30–41 px */
function shade(hex,pct){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,bl=n&255;
  r=Math.max(0,Math.min(255,Math.round(r*(100+pct)/100)));
  g=Math.max(0,Math.min(255,Math.round(g*(100+pct)/100)));
  bl=Math.max(0,Math.min(255,Math.round(bl*(100+pct)/100)));
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
function isDarkColor(hex){
  const n=parseInt(hex.slice(1),16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return (r*299+g*587+b*114)/1000<150;
}
function renderShelf(){
  const shelf=document.getElementById('shelf');
  const entries=[{id:MAIN_BOOK_ID,title:'Creciendo en la Palabra',cover:null,sc:'#1c2b47',main:true},...library.books]
    .filter(b=>b.id!==currentBookId);
  shelf.innerHTML='<div class="shelf-books">'+entries.map(b=>{
    const dark=b.cover||(b.sc&&isDarkColor(b.sc));
    const h=b.main?150:shelfH(b.id), wv=b.main?40:shelfW(b.id);
    const band=b.cover?'':(b.sc?(isDarkColor(b.sc)?'rgba(201,169,106,.85)':'rgba(150,120,70,.6)'):'rgba(180,150,100,.6)');
    const bandVar=band?`--band:${band};`:'';
    return `<button class="shelf-spine ${dark?'dark':''} ${b.cover?'cover-spine':''}" data-book="${b.id}" title="Abrir «${escapeHtml(b.title)}»" style="--h:${h}px;--sw:${wv}px;${bandVar}${spineDecls(b)}">
      <span class="shelf-title">${escapeHtml(b.title)}</span>
      ${b.main?'':`<span class="shelf-opts" data-opts="${b.id}" title="Opciones del libro" role="button">⋯</span>`}
    </button>`;
  }).join('')
  +`<button class="shelf-add" id="shelfAdd" title="Crear un libro nuevo" aria-label="Crear un libro nuevo">＋</button></div>`;
}
/* menú de opciones del lomo (portada, color, eliminar) */
const shelfMenu=document.getElementById('shelfMenu');
let shelfMenuBook=null;
function openShelfMenu(anchor,bookId){
  shelfMenuBook=bookId;

  const mw=shelfMenu.offsetWidth||170,mh=shelfMenu.offsetHeight||110;

  const maxTop=window.scrollY+document.documentElement.clientHeight-mh-8;

let switching=false;
async function switchBook(id){
  if(switching||id===currentBookId)return;
  switching=true;
  exitInk();
  clearTimeout(timer);
  if(loaded){try{await save();}catch(e){}}
  document.body.classList.add('book-out');

  if(unsubSnapshot){unsubSnapshot();unsubSnapshot=null;}
  currentBookId=id;
  cuadernoDoc=db.collection('cuaderno').doc(id);
  state={__meta:{days:[{pages:{},done:{},free:{}}],stickies:[]}};

  loaded=false;lastSavedJson=null;lastWritePid=null;
  dcur=0;mcur=0;

document.addEventListener('click',async e=>{

/* portada: se guarda dentro del libro y una miniatura en el lomo */
let pendingCoverBook=null;
document.getElementById('coverInput').addEventListener('change',e=>{
  const file=e.target.files&&e.target.files[0];
  e.target.value='';
  if(!file)return;
  const target=pendingCoverBook;pendingCoverBook=null;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=async()=>{
      const big=shrink(img,700,0.72),thumb=shrink(img,160,0.6);
      if(!target||target===currentBookId){
        meta().cover=big;
        markDirty('__meta');
        queueSave();rebuild();
        const en=libEntry(currentBookId);
        if(en){en.cover=thumb;await saveLibrary();renderShelf();}
      }else{
        try{
          const s=await db.collection('cuaderno').doc(target).get();
          let st=s.exists&&s.data().json?JSON.parse(s.data().json):{__meta:{days:[{pages:{},done:{},free:{}}],stickies:[]}};
          if(!st.__meta)st.__meta={days:[{pages:{},done:{},free:{}}],stickies:[]};
          st.__meta.cover=big;
          await db.collection('cuaderno').doc(target).set({json:JSON.stringify(st),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
        }catch(err){toast('No se pudo guardar la portada.');return;}
        const en=libEntry(target);
        if(en){en.cover=thumb;await saveLibrary();renderShelf();}
      }
      toast('Portada guardada ✓');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

 {n:64,name:'3 Juan',ch:1},{n:65,name:'Judas',ch:1},{n:66,name:'Apocalipsis',ch:22}
];
const bookByNum=n=>BIBLE_BOOKS.find(b=>b.n===+n);
const chapterCache={};
function cleanVerse(t){
  return String(t)
    .replace(/<S>.*?<\/S>/gi,'')
    .replace(/<f>.*?<\/f>/gi,'')
    .replace(/<br\s*\/?>/gi,' ')
    .replace(/<[^>]+>/g,'')
    .replace(/\s+/g,' ').trim();
}
function stripAccents(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
/* nombre del libro que usa bible-api.deno.dev, tomado de su propio /api/books
   (así no adivinamos el "slug"); si no carga, se deriva del nombre local. */
let denoBooksP=null;
function loadDenoBooks(){
  if(!denoBooksP)denoBooksP=fetch('https://bible-api.deno.dev/api/books')
    .then(r=>{if(!r.ok)throw new Error('books');return r.json();}).catch(()=>null);
  return denoBooksP;
}
async function denoBookId(bookNum){
  const books=await loadDenoBooks();
  if(Array.isArray(books)&&books[bookNum-1]&&books[bookNum-1].name)return String(books[bookNum-1].name).toLowerCase();
  return stripAccents(bookByNum(bookNum).name).toLowerCase();
}
const BIBLE_SOURCES={
  deno:async(bookNum,chapter)=>{
    const id=await denoBookId(bookNum);
    const r=await fetch(`https://bible-api.deno.dev/api/read/${BIBLE.denoTranslation}/${encodeURIComponent(id)}/${chapter}`);
    if(!r.ok)throw new Error('deno '+r.status);
    const d=await r.json();
    const arr=(d&&d.vers)||[];
    return arr.map(v=>({verse:+v.number,text:cleanVerse(v.verse)})).filter(v=>v.text).sort((a,b)=>a.verse-b.verse);
  },
  bolls:async(bookNum,chapter)=>{
    const r=await fetch(`https://bolls.life/get-text/${BIBLE.bollsTranslation}/${bookNum}/${chapter}/`);
    if(!r.ok)throw new Error('bolls '+r.status);
    const d=await r.json();
    return d.map(v=>({verse:+v.verse,text:cleanVerse(v.text)})).filter(v=>v.text).sort((a,b)=>a.verse-b.verse);
  }
};
async function fetchChapter(book,chapter){
  const key='rv1960-'+book+'-'+chapter;
  if(chapterCache[key])return chapterCache[key];
  let lastErr=null;
  for(const src of BIBLE.order){
    const fn=BIBLE_SOURCES[src];
    if(!fn)continue;
    try{
      const verses=await fn(book,chapter);
      if(verses&&verses.length){chapterCache[key]=verses;return verses;}
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('Sin fuentes disponibles');
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fillBookSelect(sel){sel.innerHTML=BIBLE_BOOKS.map(b=>`<option value="${b.n}">${b.name}</option>`).join('');}
function fillChapSelect(sel,bookNum){const b=bookByNum(bookNum);let o='';for(let i=1;i<=b.ch;i++)o+=`<option value="${i}">${i}</option>`;sel.innerHTML=o;}
function rangeLabel(nums){
  nums=[...nums].sort((a,b)=>a-b);
  if(nums.length===1)return ''+nums[0];
  const contiguous=nums[nums.length-1]-nums[0]===nums.length-1;
  return contiguous?`${nums[0]}-${nums[nums.length-1]}`:nums.join(',');
}
function buildCitation(bookName,chapter,verseObjs){
  const objs=[...verseObjs].sort((a,b)=>a.verse-b.verse);
  const ref=`${bookName} ${chapter}:${rangeLabel(objs.map(v=>v.verse))}`;
  const body=objs.map(v=>v.text).join(' ');
  return `«${body}» — ${ref} (${BIBLE.label})`;
}
function insertCitation(pid,str){
  if(!pid){toast('Abre una página del cuaderno para pegar la cita.');return false;}
  pushUndo();
  const esc=escapeHtml(str);
  const prev=state[pid]||'';
  state[pid]=prev?prev.replace(/(?:<br>\s*)+$/,'')+'<br><br>'+esc:esc;
  markDirty(pid);
  document.querySelectorAll(`.write[data-k="${pid}"]`).forEach(o=>{o.innerHTML=state[pid];});
  queueSave();
  return true;
}
/* recordar la última página escrita (para citar desde el lector) */
let lastWritePid=null;
document.addEventListener('focusin',e=>{const w=e.target.closest('.write');if(w)lastWritePid=w.dataset.k;});
function goToPid(pid){const idx=pageIndexOf(pg=>pg.type==='sec'&&kp(pg.d,pg.sec.id,pg.p)===pid);goTo(idx);}
let toastT=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ---------- LECTOR ---------- */
const readerEl=document.getElementById('reader');
const rdBook=document.getElementById('rdBook'),rdChap=document.getElementById('rdChap');
const rdBody=document.getElementById('readerBody');
const rdPrev=document.getElementById('rdPrev'),rdNext=document.getElementById('rdNext');
let rdSel=new Set();
document.getElementById('readerVer').textContent=BIBLE.label;
fillBookSelect(rdBook);fillChapSelect(rdChap,20);rdBook.value='20';rdChap.value='1';
function openReader(){readerEl.classList.add('open');readerEl.setAttribute('aria-hidden','false');loadReader();}
function closeReader(){readerEl.classList.remove('open');readerEl.setAttribute('aria-hidden','true');}
async function loadReader(){
  rdSel.clear();updateReaderCiteBar();
  const bk=+rdBook.value,ch=+rdChap.value,b=bookByNum(bk);
  rdPrev.disabled=(bk===1&&ch===1);
  rdNext.disabled=(bk===66&&ch===b.ch);
  rdBody.innerHTML=`<div class="rd-loading">Cargando ${b.name} ${ch}…</div>`;
  try{
    const verses=await fetchChapter(bk,ch);
    rdBody.innerHTML=`<div class="r-chaptitle">${b.name} ${ch}</div>`+
      verses.map(v=>`<span class="verse" data-v="${v.verse}"><span class="vnum">${v.verse}</span>${escapeHtml(v.text)}</span> `).join('');
    rdBody.scrollTop=0;
  }catch(err){
    rdBody.innerHTML=`<div class="rd-error">No se pudo cargar el texto.<br>Revisa tu conexión a internet.<br><button class="rd-retry" id="rdRetry">Reintentar</button></div>`;
    const rb=document.getElementById('rdRetry');if(rb)rb.onclick=loadReader;
  }
}
rdBook.addEventListener('change',()=>{fillChapSelect(rdChap,+rdBook.value);rdChap.value='1';loadReader();});
rdChap.addEventListener('change',loadReader);
rdPrev.addEventListener('click',()=>{let bk=+rdBook.value,ch=+rdChap.value;if(ch>1)ch--;else if(bk>1){bk--;ch=bookByNum(bk).ch;}else return;rdBook.value=''+bk;fillChapSelect(rdChap,bk);rdChap.value=''+ch;loadReader();});
rdNext.addEventListener('click',()=>{let bk=+rdBook.value,ch=+rdChap.value,b=bookByNum(bk);if(ch<b.ch)ch++;else if(bk<66){bk++;ch=1;}else return;rdBook.value=''+bk;fillChapSelect(rdChap,bk);rdChap.value=''+ch;loadReader();});
document.getElementById('readerClose').addEventListener('click',closeReader);
readerEl.addEventListener('click',e=>{if(e.target===readerEl)closeReader();});
document.getElementById('bibleSpine').addEventListener('click',openReader);
document.getElementById('bibleOpenM').addEventListener('click',openReader);
rdBody.addEventListener('click',e=>{
  const v=e.target.closest('.verse');if(!v)return;
  const n=+v.dataset.v;
  if(rdSel.has(n)){rdSel.delete(n);v.classList.remove('sel');}else{rdSel.add(n);v.classList.add('sel');}
  updateReaderCiteBar();
});
function updateReaderCiteBar(){
  const bar=document.getElementById('readerCiteBar');
  if(!rdSel.size){bar.classList.remove('on');return;}
  bar.classList.add('on');
  const b=bookByNum(+rdBook.value);
  document.getElementById('readerCiteLabel').textContent=`${b.name} ${rdChap.value}:${rangeLabel([...rdSel])} seleccionado`;
}
document.getElementById('readerCiteClear').addEventListener('click',()=>{rdSel.clear();rdBody.querySelectorAll('.verse.sel').forEach(v=>v.classList.remove('sel'));updateReaderCiteBar();});
document.getElementById('readerCiteBtn').addEventListener('click',async()=>{
  if(!rdSel.size)return;
  const bk=+rdBook.value,ch=+rdChap.value,b=bookByNum(bk);
  try{
    const verses=await fetchChapter(bk,ch);
    const chosen=verses.filter(v=>rdSel.has(v.verse));
    const pid=lastWritePid;
    if(insertCitation(pid,buildCitation(b.name,ch,chosen))){closeReader();toast('Cita agregada a tu página ✓');goToPid(pid);}
  }catch(err){toast('No se pudo obtener el texto para citar.');}
});

/* ---------- MODAL DE CITA (desde la barra de la página) ---------- */
const citeModal=document.getElementById('citeModal');
const ctBook=document.getElementById('ctBook'),ctChap=document.getElementById('ctChap');
const ctVerses=document.getElementById('citeVerses'),ctPreview=document.getElementById('citePreview');
const ctPaste=document.getElementById('citePaste');
let ctPid=null,ctSel=new Set(),ctLoaded=[],ctLastBook=20,ctLastChap=1;
fillBookSelect(ctBook);fillChapSelect(ctChap,20);ctBook.value='20';ctChap.value='1';
function openCite(pid){
  ctPid=pid;ctSel.clear();ctPreview.textContent='';ctPaste.disabled=true;
  ctBook.value=''+ctLastBook;fillChapSelect(ctChap,ctLastBook);ctChap.value=''+ctLastChap;
  citeModal.classList.add('open');citeModal.setAttribute('aria-hidden','false');
  loadCiteVerses();
}
function closeCite(){citeModal.classList.remove('open');citeModal.setAttribute('aria-hidden','true');ctPid=null;}
async function loadCiteVerses(){
  ctSel.clear();ctPreview.textContent='';ctPaste.disabled=true;
  ctLastBook=+ctBook.value;ctLastChap=+ctChap.value;
  const bk=+ctBook.value,ch=+ctChap.value,b=bookByNum(bk);
  ctVerses.innerHTML=`<div class="rd-loading" style="width:100%">Cargando ${b.name} ${ch}…</div>`;
  try{
    ctLoaded=await fetchChapter(bk,ch);
    ctVerses.innerHTML=ctLoaded.map(v=>`<button class="cite-vchip" data-v="${v.verse}">${v.verse}</button>`).join('');
  }catch(err){
    ctVerses.innerHTML=`<div class="rd-error" style="width:100%">No se pudo cargar.<br><button class="rd-retry" id="ctRetry">Reintentar</button></div>`;
    const rb=document.getElementById('ctRetry');if(rb)rb.onclick=loadCiteVerses;
  }
}
ctBook.addEventListener('change',()=>{fillChapSelect(ctChap,+ctBook.value);ctChap.value='1';loadCiteVerses();});
ctChap.addEventListener('change',loadCiteVerses);
ctVerses.addEventListener('click',e=>{
  const chip=e.target.closest('.cite-vchip');if(!chip)return;
  const n=+chip.dataset.v;
  if(ctSel.has(n)){ctSel.delete(n);chip.classList.remove('sel');}else{ctSel.add(n);chip.classList.add('sel');}
  updateCitePreview();
});
function updateCitePreview(){
  if(!ctSel.size){ctPreview.textContent='';ctPaste.disabled=true;return;}
  const b=bookByNum(+ctBook.value),ch=+ctChap.value;
  ctPreview.textContent=buildCitation(b.name,ch,ctLoaded.filter(v=>ctSel.has(v.verse)));
  ctPaste.disabled=false;
}
ctPaste.addEventListener('click',()=>{
  if(!ctSel.size||!ctPid)return;
  const b=bookByNum(+ctBook.value),ch=+ctChap.value;
  const pid=ctPid;
  if(insertCitation(pid,buildCitation(b.name,ch,ctLoaded.filter(v=>ctSel.has(v.verse))))){closeCite();toast('Cita pegada en tu página ✓');}
});
document.getElementById('citeClose').addEventListener('click',closeCite);
document.getElementById('citeCancel').addEventListener('click',closeCite);
citeModal.addEventListener('click',e=>{if(e.target===citeModal)closeCite();});
document.addEventListener('click',e=>{const b=e.target.closest('[data-action="cite"]');if(b)openCite(b.dataset.pid);});

/* teclado: Escape cierra; flechas no pasan la página de atrás mientras hay overlay */
document.addEventListener('keydown',e=>{
  const overlay=readerEl.classList.contains('open')||citeModal.classList.contains('open');
  if(!overlay)return;
  if(e.key==='Escape'){if(citeModal.classList.contains('open'))closeCite();else closeReader();e.stopPropagation();return;}
  if(e.key==='ArrowLeft'||e.key==='ArrowRight')e.stopPropagation();
},true);
</script>
